services:
  redis:
    ports:
      - "6379:6379"

  web:
    build:
      target: development
    command: bun run dev
    volumes:
      - ./web:/app
      - web_node_modules:/app/node_modules
    environment:
      - NODE_ENV=development

  api:
    command: uv run --locked uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./api:/app

  worker:
    volumes:
      - ./api:/app

  worker-short:
    volumes:
      - ./api:/app

  dispatcher:
    volumes:
      - ./api:/app

  scheduler:
    volumes:
      - ./api:/app

volumes:
  web_node_modules:
