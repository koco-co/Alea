name: Bug report
description: Report a reproducible Alea defect
title: "[Bug] "
body:
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Include route, role, viewport, actions, and redacted evidence.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected and actual result
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Safety
      options:
        - label: I removed secrets, DSNs, tokens and personal data.
          required: true
