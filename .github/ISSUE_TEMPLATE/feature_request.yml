name: Feature request
description: Propose a product change for research and confirmation
title: "[Feature] "
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem and affected users
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Proposed acceptance criteria
    validations:
      required: true
  - type: textarea
    id: risks
    attributes:
      label: Data, security, permission, migration, and compatibility risks
