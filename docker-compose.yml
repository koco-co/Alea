services:
  nginx:
    image: nginx:1.27.5-alpine
    ports: ["80:80"]
    volumes: ["./nginx.conf:/etc/nginx/nginx.conf:ro"]
    depends_on:
      web: {condition: service_healthy}
      api: {condition: service_healthy}

  web:
    build:
      context: ./web
      args:
        - NEXT_PUBLIC_SUPABASE_URL=${PROJECT_URL}
        - NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=${PUBLISHABLE_KEY}
    hostname: alea-web
    environment:
      - INTERNAL_API_URL=http://api:8000
      - CODEX_RUNNER_URL=http://host.docker.internal:8765
      - ALEA_RUNNER_TOKEN=${ALEA_RUNNER_TOKEN}
      - PORT=3000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "bun -e \"fetch('http://0.0.0.0:3000/api/health').then(r=>{if(!r.ok)process.exit(1)})\""]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s

  api:
    build: ./api
    environment:
      - SUPABASE_URL=${PROJECT_URL}
      - SUPABASE_PUBLISHABLE_KEY=${PUBLISHABLE_KEY}
      - SUPABASE_SECRET_KEY=${SECRET_KEY}
      - DATABASE_URL_ALEA_API=${DATABASE_URL_ALEA_API}
      - PROVIDER_KEK_V1=${PROVIDER_KEK_V1}
      - CODEX_RUNNER_URL=http://host.docker.internal:8765
      - ALEA_RUNNER_TOKEN=${ALEA_RUNNER_TOKEN}
      - REDIS_URL=redis://redis:6379/0
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis: {condition: service_healthy}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s

  worker:
    build: ./api
    command: /opt/venv/bin/celery -A app.workers.celery_app worker --loglevel=info --concurrency=4 -Q long
    environment:
      - DATABASE_URL_ALEA_WORKER=${DATABASE_URL_ALEA_WORKER}
      - PROVIDER_KEK_V1=${PROVIDER_KEK_V1}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis: {condition: service_healthy}

  worker-short:
    build: ./api
    command: /opt/venv/bin/celery -A app.workers.celery_app worker --loglevel=info --concurrency=2 -Q default
    environment:
      - DATABASE_URL_ALEA_WORKER=${DATABASE_URL_ALEA_WORKER}
      - PROVIDER_KEK_V1=${PROVIDER_KEK_V1}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis: {condition: service_healthy}

  dispatcher:
    build: ./api
    command: /opt/venv/bin/python -m app.workers.dispatcher
    environment:
      - DATABASE_URL_ALEA_DISPATCHER=${DATABASE_URL_ALEA_DISPATCHER}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis: {condition: service_healthy}

  scheduler:
    build: ./api
    command: /opt/venv/bin/celery -A app.workers.celery_app beat --loglevel=info
    environment:
      - DATABASE_URL_ALEA_SCHEDULER=${DATABASE_URL_ALEA_SCHEDULER}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis: {condition: service_healthy}

  redis:
    image: redis:7.4.3-alpine
    command: redis-server --appendonly yes --appendfsync everysec
    volumes: ["redis_data:/data"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  redis_data:
